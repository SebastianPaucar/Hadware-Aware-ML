    type: lr_schduler
    name: CDRW
    config:
      initial_learning_rate: 0.0001
      first_decay_steps: 32
      t_mul: 2.0
      m_mul: 0.65
      alpha: 1.0e-06
      name: CDR_W
      warmup_epochs: 10
